name: Build APK and Deploy to Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Set agar semua perintah 'run' berjalan di dalam subfolder proyek jika jalurnya bergeser
defaults:
  run:
    working-directory: .

jobs:
  # 1. JOB UNTUK DEPLOY WEBSITE KE GITHUB PAGES
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            cd payroll && npm install
          fi

      - name: Build Web Assets
        run: |
          if [ -f package.json ]; then
            npm run build
          else
            cd payroll && npm run build
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Jika package.json ada di dalam folder payroll, arahkan ke payroll/dist atau payroll/www
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 2. JOB UNTUK BUILD ANDROID APK
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            cd payroll && npm install
          fi

      - name: Build Web Assets & Sync Capacitor
        run: |
          if [ -f package.json ]; then
            npm run cap:sync
          else
            cd payroll && npm run cap:sync
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK
        run: |
          if [ -d "android" ]; then
            cd android
          else
            cd payroll/android
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sri_Rejeki_Toko_Roti_Debug_APK
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            payroll/android/app/build/outputs/apk/debug/app-debug.apk